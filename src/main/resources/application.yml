spring:
  application:
    name: fleetops-asignaciones

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS}

  # Región AWS del microservicio. Credenciales se resuelven con el proveedor por defecto
  # (rol IAM de la instancia/tarea en AWS; variables de entorno o ~/.aws/credentials en local).
  cloud:
    aws:
      region:
        static: ${AWS_REGION:us-east-1}
      credentials:
        instance-profile: true          # Usa el rol IAM de la EC2

server:
  port: ${SERVER_PORT:8082}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
      group:
        liveness:
          include: livenessState
        readiness:
          include: readinessState,db
  metrics:
    tags:
      application: ${spring.application.name}
  prometheus:
    metrics:
      export:
        enabled: true

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

asignaciones:
  kafka:
    consumer:
      group-id: ${KAFKA_CONSUMER_GROUP_ID:asignaciones-group}
    producer:
      transaction-id-prefix: ${KAFKA_PRODUCER_TRANSACTION_ID_PREFIX:asignaciones-tx}
    topics:
      vehiculos-solicitar:   ${KAFKA_TOPIC_VEHICULOS_SOLICITAR:fleetops.vehiculos.solicitar}
      vehiculos-liberar:     ${KAFKA_TOPIC_VEHICULOS_LIBERAR:fleetops.vehiculos.liberar}
      vehiculos-confirmado:  ${KAFKA_TOPIC_VEHICULOS_CONFIRMADO:fleetops.asignaciones.vehiculo.confirmado}
      vehiculos-fallido:     ${KAFKA_TOPIC_VEHICULOS_FALLIDO:fleetops.asignaciones.vehiculo.fallido}
      asignacion-completada: ${KAFKA_TOPIC_ASIGNACION_COMPLETADA:fleetops.asignaciones.completada}
      asignacion-fallida:    ${KAFKA_TOPIC_ASIGNACION_FALLIDA:fleetops.asignaciones.fallida}
  sqs:
    queues:
      queue_assignations: ${SQS_QUEUE_INCIDENTES_FALLA:queue_assignations}
