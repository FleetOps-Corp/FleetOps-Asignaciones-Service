
networks:
  fleetops-net:
    driver: bridge

volumes:
  postgres-data:
  prometheus-data:
  grafana-data:

services:

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: fleetops-zookeeper
    networks:
      - fleetops-net
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: fleetops-kafka
    networks:
      - fleetops-net
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "${KAFKA_EXTERNAL_PORT:-9092}:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: ${KAFKA_ADVERTISED_LISTENERS}
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 15s
      timeout: 10s
      retries: 5


  localstack:
    image: localstack/localstack:3.7
    container_name: fleetops-localstack
    networks:
      - fleetops-net
    ports:
      - "4566:4566"
    environment:
      SERVICES: sns,sqs
      DEFAULT_REGION: us-east-1
    volumes:
      - ./scripts/localstack-init.sh:/etc/localstack/init/ready.d/localstack-init.sh:ro
    healthcheck:
      test: ["CMD", "awslocal", "sqs", "list-queues"]
      interval: 10s
      timeout: 5s
      retries: 10

  postgres:
    image: postgres:16.3-alpine3.20
    container_name: fleetops-postgres
    networks:
      - fleetops-net
    volumes:
      - postgres-data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  asignaciones:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fleetops-asignaciones
    networks:
      - fleetops-net
    ports:
      - "${SERVER_PORT:-8020}:8020"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      localstack:
        condition: service_healthy
    environment:
      SERVER_PORT: 8020
      DB_URL: jdbc:postgresql://postgres:5432/${DB_NAME}
      JWT_ALGORITHM: ${JWT_ALGORITHM}
      JWT_PUBLIC_KEY_PATH: ${JWT_PUBLIC_KEY_PATH}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS}
      KAFKA_CONSUMER_GROUP_ID: ${KAFKA_CONSUMER_GROUP_ID}
      KAFKA_PRODUCER_TRANSACTION_ID_PREFIX: ${KAFKA_PRODUCER_TRANSACTION_ID_PREFIX}
      KAFKA_TOPIC_VEHICULOS_SOLICITAR: ${KAFKA_TOPIC_VEHICULOS_SOLICITAR:-fleetops.vehiculos.solicitar}
      KAFKA_TOPIC_VEHICULOS_LIBERAR: ${KAFKA_TOPIC_VEHICULOS_LIBERAR:-fleetops.vehiculos.liberar}
      KAFKA_TOPIC_VEHICULOS_CONFIRMADO: ${KAFKA_TOPIC_VEHICULOS_CONFIRMADO:-fleetops.asignaciones.vehiculo.confirmado}
      KAFKA_TOPIC_VEHICULOS_FALLIDO: ${KAFKA_TOPIC_VEHICULOS_FALLIDO:-fleetops.asignaciones.vehiculo.fallido}
      KAFKA_TOPIC_ASIGNACION_COMPLETADA: ${KAFKA_TOPIC_ASIGNACION_COMPLETADA:-fleetops.asignaciones.completada}
      KAFKA_TOPIC_ASIGNACION_FALLIDA: ${KAFKA_TOPIC_ASIGNACION_FALLIDA:-fleetops.asignaciones.fallida}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      SQS_QUEUE_INCIDENTES_FALLA: ${SQS_QUEUE_INCIDENTES_FALLA:-queue_assignations}

  prometheus:
    image: prom/prometheus:latest
    container_name: fleetops-prometheus
    networks:
      - fleetops-net
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    depends_on:
      - asignaciones
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: fleetops-grafana
    networks:
      - fleetops-net
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning/datasources/prometheus.yml:/etc/grafana/provisioning/datasources/prometheus.yml:ro
    depends_on:
      - prometheus
    restart: unless-stopped
